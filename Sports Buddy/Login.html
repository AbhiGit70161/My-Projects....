<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sports Buddy</title>
    <link rel="stylesheet" href="everystyles.css">
</head>
<body>

    <div class="auth-container">
        <h1>Sports Buddy</h1>
        
        <div class="tab-buttons">
            <button onclick="showForm('user-login')">User Login</button>
            <button onclick="showForm('user-register')">Register</button>
            <button onclick="showForm('admin-login')">Admin Access</button>
        </div>

        <form id="user-login" class="auth-form">
            <h2>User Login</h2>
            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <form id="user-register" class="auth-form" style="display:none;">
            <h2>Create Account</h2>
            <input type="text" id="reg-name" placeholder="Full Name" required>
            <input type="email" id="reg-email" placeholder="Email" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>

        <form id="admin-login" class="auth-form" style="display:none;">
            <h2>Admin Portal</h2>
            <input type="email" id="admin-email" placeholder="Admin Email" required>
            <input type="password" id="admin-password" placeholder="Admin Password" required>
            <button type="submit" class="admin-btn">Admin Login</button>
        </form>
    </div>

    <script type="module" src="fb-con.js"></script>
    <script type="module" src="authen.js"></script>

    <script>
        function showForm(formId) {
            document.querySelectorAll('.auth-form').forEach(form => form.style.display = 'none');
            document.getElementById(formId).style.display = 'block';
        }
    </script>
</body>

</html>
